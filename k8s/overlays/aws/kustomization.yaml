apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - cluster-issuer.yaml
namespace: eve

# Strategic merge patches
patches:
  - path: api-ingress-patch.yaml
  - path: api-deployment-patch.yaml
  - path: agent-runtime-deployment-patch.yaml
  - path: agent-runtime-pvc-patch.yaml
  - path: buildkitd-pvc-patch.yaml
  - path: gateway-ingress-patch.yaml
  - path: gateway-deployment-patch.yaml
  - path: supabase-auth-ingress-patch.yaml
  - path: supabase-auth-deployment-patch.yaml
  - path: sso-ingress-patch.yaml
  - path: sso-deployment-patch.yaml
  - path: orchestrator-deployment-patch.yaml
  - path: worker-deployment-patch.yaml
  - path: api-serviceaccount-patch.yaml
  - path: registry-configmap-patch.yaml
  - path: registry-serviceaccount-patch.yaml
  - path: registry-ingress-patch.yaml
  # Delete db-migrate-job from kustomize build — it's a one-shot job
  # applied separately by the deploy workflow's migration step.
  - target:
      kind: Job
      name: eve-db-migrate
    patch: |
      $patch: delete
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: eve-db-migrate
  # Delete postgres resources (using RDS instead)
  - target:
      kind: StatefulSet
      name: postgres
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: postgres
  - target:
      kind: Service
      name: postgres
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: postgres
  - target:
      kind: Secret
      name: eve-postgres
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: eve-postgres
  # Delete eve-app secret (staging manages it independently via kubectl)
  - target:
      kind: Secret
      name: eve-app
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: eve-app
