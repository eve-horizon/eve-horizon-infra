apiVersion: apps/v1
kind: Deployment
metadata:
  name: eve-api
  namespace: eve
spec:
  template:
    spec:
      containers:
        - name: api
          image: public.ecr.aws/w7c4v0w3/eve-horizon/api:0.1.132
          env:
            - $patch: replace
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: eve-staging-db
                  key: DATABASE_URL
            - name: API_PORT
              value: "4701"
            - name: EVE_API_URL
              value: "https://api.eve.example.com"
            - name: WORKER_URL
              value: http://eve-worker.eve.svc.cluster.local:4749
            - name: EVE_GATEWAY_URL
              value: "http://eve-gateway.eve.svc.cluster.local:4820"
            - name: EVE_PUBLIC_API_URL
              value: "https://api.eve.example.com"
            - name: EVE_DEFAULT_DOMAIN
              value: "eve.example.com"
            - name: EVE_REGISTRY_HOST
              value: registry.eve.example.com
            - name: EVE_REGISTRY_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: eve-app
                  key: EVE_REGISTRY_SIGNING_KEY
                  optional: true
            - name: EVE_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: eve-app
                  key: EVE_INTERNAL_API_KEY
            - name: EVE_STORAGE_BACKEND
              value: "s3"
            - name: EVE_STORAGE_REGION
              value: "eu-west-1"
            - name: EVE_STORAGE_INTERNAL_BUCKET
              value: "eve-internal"
            - name: EVE_STORAGE_ORG_BUCKET_PREFIX
              value: "eve-org"
