apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eve-gateway
  namespace: eve
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.eve.example.com
      secretName: eve-api-tls
  rules:
    - host: api.eve.example.com
      http:
        paths:
          - path: /gateway/providers
            pathType: Prefix
            backend:
              service:
                name: eve-gateway
                port:
                  number: 4820
