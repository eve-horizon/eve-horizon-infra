apiVersion: apps/v1
kind: Deployment
metadata:
  name: eve-api
  namespace: eve
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: public.ecr.aws/w7c4v0w3/eve-horizon/api:latest
          imagePullPolicy: IfNotPresent
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          env:
            - name: DATABASE_URL
              value: ""
              valueFrom:
                secretKeyRef:
                  name: eve-app
                  key: DATABASE_URL
            - name: EVE_STORAGE_BACKEND
              value: "gcs"
            - name: EVE_STORAGE_REGION
              value: "YOUR_REGION"
            - name: EVE_STORAGE_INTERNAL_BUCKET
              value: "INSTANCE_PREFIX-eve-internal"
            - name: EVE_STORAGE_ORG_BUCKET_PREFIX
              value: "INSTANCE_PREFIX-eve-org"
