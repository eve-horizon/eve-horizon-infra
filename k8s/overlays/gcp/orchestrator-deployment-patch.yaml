apiVersion: apps/v1
kind: Deployment
metadata:
  name: eve-orchestrator
  namespace: eve
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    spec:
      serviceAccountName: eve-orchestrator
      terminationGracePeriodSeconds: 30
      containers:
        - name: orchestrator
          image: public.ecr.aws/w7c4v0w3/eve-horizon/orchestrator:latest
          imagePullPolicy: IfNotPresent
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          env:
            - name: DATABASE_URL
              value: ""
              valueFrom:
                secretKeyRef:
                  name: eve-app
                  key: DATABASE_URL
            - name: EVE_STORAGE_BACKEND
              value: "gcs"
            - name: EVE_STORAGE_REGION
              value: "YOUR_REGION"
            - name: EVE_MANAGED_DB_RECONCILER_ENABLED
              value: "true"
            - name: EVE_MANAGED_DB_LOCAL_SEED
              value: "true"
