apiVersion: apps/v1
kind: Deployment
metadata:
  name: eve-sso
  namespace: eve
spec:
  template:
    spec:
      containers:
        - name: sso
          image: public.ecr.aws/w7c4v0w3/eve-horizon/sso:latest
          env:
            - name: SUPABASE_AUTH_EXTERNAL_URL
              value: "https://auth.example.com"
            - name: EVE_DEFAULT_DOMAIN
              value: "example.com"
            - name: EVE_SSO_SECURE_COOKIES
              value: "true"
