apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eve-sso
  namespace: eve
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - sso.example.com
      secretName: eve-sso-tls
  rules:
    - host: sso.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eve-sso
                port:
                  number: 3100
