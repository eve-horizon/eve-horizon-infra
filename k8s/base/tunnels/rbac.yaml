# RBAC for eve-api to manage Services in the eve-tunnels namespace.
# This allows the Private Endpoints API to create/delete ExternalName Services
# that the Tailscale operator uses for egress routing.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eve-api-tunnels
  namespace: eve-tunnels
rules:
  - apiGroups: [""]
    resources:
      - services
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups: [""]
    resources:
      - namespaces
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eve-api-tunnels
  namespace: eve-tunnels
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eve-api-tunnels
subjects:
  - kind: ServiceAccount
    name: eve-api
    namespace: eve
